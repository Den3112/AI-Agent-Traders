name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check .

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build Gateway
        run: docker build -f Dockerfile.gateway -t gateway-check .
      - name: Build Dashboard
        run: docker build -f Dockerfile.dashboard -t dashboard-check .
