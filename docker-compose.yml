services:
  gateway:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    ports:
      - "18791:18789"
    env_file:
      - .env
    environment:
      - OPENCLAW_CONFIG_PATH=/app/config/openclaw.json
      - OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
    volumes:
      - .:/app
      - ./agents:/app/agents
      - ./config/openclaw.json:/app/openclaw.json
      - /app/node_modules # Don't override container node_modules with host ones
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./dashboard:/app/dashboard
      - ./data:/app/data
      - ./logs/heartbeat.log:/app/heartbeat.log
      - /app/dashboard/node_modules
    restart: always
    depends_on:
      - gateway

  trader:
    build:
      context: .
      dockerfile: docker/gateway.Dockerfile
    env_file:
      - .env
    environment:
      - OPENCLAW_URL=http://gateway:18789/chat
      - OPENCLAW_CONFIG_PATH=/app/config/openclaw.json
    volumes:
      - .:/app
      - ./agents:/app/agents
      - ./config/openclaw.json:/app/openclaw.json
    command: ["python3", "scripts/ai/continuous_loop.py"]
    restart: always
    depends_on:
      - gateway
